<!-- DASHBOARD VIEW -->
<div id="dashboard-view" class="block animate-fade-in-up">

    <!-- Header -->
    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-10 animate-fade-in-up"
        style="animation-delay: 0.1s;">
        <div>
            <h1 class="text-3xl md:text-3xl font-heading font-bold text-white mb-1">Welcome back! 👋
            </h1>
            <p class="text-gray-400 text-sm">Review your progress and crush new goals.</p>
        </div>
        <button id="btn-log-pr"
            class="group relative px-6 py-3 bg-primary hover:bg-green-400 text-background-dark font-bold rounded-xl shadow-lg shadow-primary/20 transition-all transform active:scale-95 flex items-center justify-center gap-2 overflow-hidden">
            <span
                class="absolute inset-0 bg-white/20 translate-y-full group-hover:translate-y-0 transition-transform duration-300"></span>
            <span class="material-symbols-outlined text-xl">add</span>
            <span>Log PR</span>
        </button>
    </div>

    <!-- Recent PRs (Moved to Top) -->
    <div class="mb-8">
        <div class="flex items-center justify-between mb-4">
            <h2 class="text-sm font-heading font-bold text-gray-400 uppercase tracking-widest">Recent
                Records</h2>
            <button id="btn-view-all" onclick="switchView('history')"
                class="text-xs font-bold text-primary hover:text-white transition-colors cursor-pointer">View
                All</button>
        </div>

        <!-- PR Cards Container -->
        <div id="pr-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
            <!-- Injected by JS -->
            <div class="h-20 rounded-xl glass-card animate-pulse"></div>
            <div class="h-20 rounded-xl glass-card animate-pulse" style="animation-delay: 0.1s"></div>
            <div class="h-20 rounded-xl glass-card animate-pulse" style="animation-delay: 0.2s"></div>
            <div class="h-20 rounded-xl glass-card animate-pulse" style="animation-delay: 0.3s"></div>
        </div>
    </div>

    <!-- Analytics Main Grid -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">

        <!-- Left Column: Summary & Focus -->
        <div class="space-y-8 flex flex-col">
            <!-- Stats Grid (Workouts + Tonnage) -->
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                <!-- Stat 1 -->
                <div class="glass-card p-6 rounded-2xl animate-fade-in-up" style="animation-delay: 0.15s;">
                    <div class="flex items-start justify-between mb-4">
                        <div
                            class="w-10 h-10 rounded-lg bg-surface-dark flex items-center justify-center text-primary border border-white/5">
                            <span class="material-symbols-outlined">fitness_center</span>
                        </div>
                        <span id="stats-weekly-badge"
                            class="text-xs font-bold text-primary bg-primary/10 px-2 py-1 rounded-full">+0
                            this week</span>
                    </div>
                    <h3 class="text-gray-400 text-xs font-bold uppercase tracking-wide mb-1">Total
                        PR's
                    </h3>
                    <div class="flex items-baseline gap-2">
                        <span id="stats-total-count" class="text-4xl font-bold text-white">0</span>
                        <span class="text-sm text-gray-400">records</span>
                    </div>
                </div>

                <!-- Stat 2: Daily Motivation -->
                <div class="glass-card p-6 rounded-2xl animate-fade-in-up flex flex-col items-center justify-center text-center relative overflow-hidden group min-h-[140px]"
                    style="animation-delay: 0.2s;">
                    <div
                        class="absolute inset-0 bg-gradient-to-br from-primary/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-700">
                    </div>
                    <span
                        class="material-symbols-outlined text-primary/20 text-4xl absolute -top-2 -left-2 rotate-180">format_quote</span>
                    <p id="daily-quote-text"
                        class="text-sm md:text-base font-bold text-white italic leading-relaxed relative z-10 px-2">
                        Loading motivation...
                    </p>
                    <span
                        class="material-symbols-outlined text-primary/20 text-4xl absolute -bottom-2 -right-2">format_quote</span>
                </div>
            </div>

            <!-- Training Focus (Moved Here) -->
            <div class="glass-card p-6 rounded-2xl animate-fade-in-up flex-1 flex flex-col justify-center"
                style="animation-delay: 0.4s;">
                <h3 class="text-lg font-bold text-white mb-1">Training Focus</h3>
                <p id="training-focus-label" class="text-xs text-gray-400 mb-6 font-medium tracking-wider">All Time</p>

                <div class="flex flex-col sm:flex-row items-center justify-center gap-8">
                    <!-- Chart -->
                    <div id="dashboard-focus-chart" class="relative w-48 h-48 rounded-full flex-shrink-0"
                        style="background: conic-gradient(#13ec5b 0% 35%, rgba(255,255,255,0.1) 35% 65%, rgba(148,163,184,0.3) 65% 100%); mask-image: radial-gradient(transparent 55%, black 56%); -webkit-mask-image: radial-gradient(transparent 55%, black 56%);">
                        <!-- Inner Text -->
                        <div class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
                            <span class="text-4xl font-bold text-white" id="dashboard-total-prs">0</span>
                            <span class="text-xs text-gray-400 uppercase tracking-widest mt-1">Total</span>
                        </div>
                    </div>

                    <!-- Legend -->
                    <div id="training-focus-legend" class="space-y-3 w-full max-w-[150px]">
                        <!-- Dynamically Populated by JS -->
                    </div>
                </div>
            </div>
        </div>

        <!-- Right Column: Milestones Widget -->
        <div class="h-full">
            <div class="glass-card p-6 rounded-2xl animate-fade-in-up h-full flex flex-col"
                style="animation-delay: 0.5s;">
                <div class="flex items-center justify-between mb-6">
                    <h3 class="text-lg font-bold text-white">Milestones</h3>
                    <button onclick="switchView('milestones')"
                        class="text-xs text-primary hover:text-white font-bold transition-colors cursor-pointer">View
                        All</button>
                </div>

                <!-- Milestones Widget List (Top 6) -->
                <div id="milestones-widget" class="grid grid-cols-1 md:grid-cols-2 gap-4 flex-1">
                    <!-- Populated by JS -->
                    <div class="text-center text-gray-500 text-sm py-10 col-span-full">Loading...</div>
                </div>
            </div>
        </div>
    </div>

</div> <!-- End Dashboard View -->
