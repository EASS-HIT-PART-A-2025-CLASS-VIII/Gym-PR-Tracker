<!-- Modal Backdrop -->
<div id="log-pr-modal" class="fixed inset-0 z-[100] hidden" aria-labelledby="modal-title" role="dialog"
    aria-modal="true">
    <!-- Backdrop -->
    <div
        class="absolute inset-0 bg-black/60 backdrop-blur-sm transition-opacity opacity-0 animate-[fadeIn_0.3s_ease-out_forwards]">
    </div>

    <div class="fixed inset-0 flex items-center justify-center p-4">
        <!-- Modal Panel -->
        <div
            class="relative bg-[#0B1510] border border-white/10 rounded-3xl max-w-md w-full p-6 lg:p-8 shadow-2xl transform scale-95 opacity-0 animate-scale-in overflow-hidden">
            <!-- Glossy highlight top -->
            <div
                class="absolute top-0 left-0 right-0 h-32 bg-gradient-to-b from-white/5 to-transparent pointer-events-none">
            </div>

            <!-- Header -->
            <div class="flex items-start gap-4 mb-8 relative z-10">
                <div
                    class="w-12 h-12 rounded-full bg-primary/10 flex items-center justify-center text-primary border border-primary/20">
                    <span class="material-symbols-outlined">fitness_center</span>
                </div>
                <div>
                    <h3 class="text-xl font-bold text-white mb-1" id="modal-title">Log New Personal Record</h3>
                    <p class="text-sm text-gray-400">Smash a new PR? Let's track it.</p>
                </div>
            </div>

            <form id="log-pr-form" class="relative z-10">
                <!-- Exercise -->
                <div class="mb-4">
                    <label class="block text-gray-400 text-xs font-bold mb-2 uppercase tracking-wide">Exercise</label>
                    <div class="relative">
                        <select id="exercise" name="exercise"
                            class="w-full bg-surface-dark border border-white/10 text-white rounded-lg px-4 py-3 appearance-none focus:outline-none focus:border-primary/50 transition-colors cursor-pointer">
                            <!-- Populated by JS -->
                        </select>
                        <div
                            class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-400">
                            <span class="material-symbols-outlined text-sm">expand_more</span>
                        </div>
                    </div>
                </div>

                <!-- Target Muscle (NEW) -->
                <div class="mb-4">
                    <label class="block text-gray-400 text-xs font-bold mb-2 uppercase tracking-wide">Target
                        Muscle</label>
                    <div class="relative">
                        <select id="muscle_group" name="muscle_group"
                            class="w-full bg-surface-dark border border-white/10 text-white rounded-lg px-4 py-3 appearance-none focus:outline-none focus:border-primary/50 transition-colors cursor-pointer">
                            <!-- Populated by JS -->
                        </select>
                        <div
                            class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-400">
                            <span class="material-symbols-outlined text-sm">expand_more</span>
                        </div>
                    </div>
                </div>

                <!-- Weight & Reps -->
                <div class="grid grid-cols-2 gap-4 mb-8">
                    <div>
                        <label class="block text-gray-400 text-xs font-bold mb-2 uppercase tracking-wide">Weight
                            (kg)</label>
                        <input type="number" step="0.5" min="0.5" name="weight" id="weight" placeholder="0.0" required
                            class="w-full bg-surface-dark border border-white/10 text-white rounded-lg px-4 py-3 focus:outline-none focus:border-primary/50 transition-colors placeholder-gray-600 font-bold text-lg">
                    </div>
                    <div>
                        <label class="block text-gray-400 text-xs font-bold mb-2 uppercase tracking-wide">Reps</label>
                        <input type="number" name="reps" id="reps" value="1" min="1" required
                            class="w-full bg-surface-dark border border-white/10 text-white rounded-lg px-4 py-3 focus:outline-none focus:border-primary/50 transition-colors placeholder-gray-600 font-bold text-lg">
                    </div>
                </div>

                <!-- Actions -->
                <div class="flex items-center justify-end gap-3">
                    <button type="button" id="btn-cancel-modal"
                        class="px-5 py-2.5 rounded-xl text-gray-400 font-bold hover:text-white hover:bg-white/5 transition-colors text-sm">Cancel</button>
                    <button type="submit"
                        class="px-6 py-2.5 rounded-xl bg-primary hover:bg-green-400 text-background-dark font-bold shadow-lg shadow-primary/20 transition-all text-sm flex items-center gap-2">
                        <span id="modal-submit-text">Save Record</span>
                        <span class="material-symbols-outlined text-lg">arrow_forward</span>
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Delete Confirmation Modal -->
<div id="delete-modal" class="fixed inset-0 z-[110] hidden" role="dialog" aria-modal="true">
    <!-- Backdrop -->
    <div
        class="absolute inset-0 bg-black/60 backdrop-blur-sm transition-opacity opacity-0 animate-[fadeIn_0.3s_ease-out_forwards]">
    </div>

    <div class="fixed inset-0 flex items-center justify-center p-4">
        <div
            class="relative bg-[#1E1E1E] border border-white/10 rounded-2xl max-w-sm w-full p-6 shadow-2xl transform scale-95 opacity-0 animate-scale-in">
            <h3 class="text-xl font-bold text-white mb-2">Delete Record?</h3>
            <p class="text-gray-400 text-sm mb-6">Are you sure you want to delete this personal record? This action
                cannot be undone.</p>

            <div class="flex items-center justify-end gap-3">
                <button id="btn-cancel-delete"
                    class="px-5 py-2.5 rounded-xl text-gray-300 font-bold hover:text-white hover:bg-white/5 transition-colors text-sm">Cancel</button>
                <button id="btn-confirm-delete"
                    class="px-6 py-2.5 rounded-xl bg-red-500 hover:bg-red-600 text-white font-bold shadow-lg shadow-red-500/20 transition-all text-sm">Delete</button>
            </div>
        </div>
    </div>
</div>

<!-- Toast Notification -->
<div id="toast-container"
    class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 pointer-events-none flex flex-col gap-2 transition-all">
    <!-- Toasts injected here -->
</div>
