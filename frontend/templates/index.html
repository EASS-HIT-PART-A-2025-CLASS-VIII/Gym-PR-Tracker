<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gym PR Tracker</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/static/js/tailwind.config.js"></script>
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700&family=Noto+Sans:wght@400;500;700&display=swap"
        rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="/static/css/styles.css">
</head>

<body class="bg-background-dark text-white font-body selection:bg-primary selection:text-background-dark antialiased">

    <div class="flex h-screen overflow-hidden">

        {% include 'sidebar.html' %}

        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto overflow-x-hidden relative scroll-smooth thin-scrollbar" id="main-content">
            <!-- Background Gradients -->
            <div class="fixed top-0 left-0 w-full h-full pointer-events-none z-0">
                <div class="absolute top-[-20%] left-[-10%] w-[50%] h-[50%] rounded-full bg-primary/5 blur-[120px]">
                </div>
                <div class="absolute bottom-[-20%] right-[-5%] w-[40%] h-[40%] rounded-full bg-blue-500/5 blur-[120px]">
                </div>
            </div>

            <div class="relative z-10 max-w-7xl mx-auto px-6 py-8 lg:px-10 lg:py-10">

                {% include 'dashboard.html' %}
                {% include 'milestones.html' %}
                {% include 'history.html' %}
                {% include 'analytics.html' %}

            </div>

            <div class="mt-20 text-center text-xs text-gray-500 pb-10">
                &copy; 2026 Gym PR Tracker.
            </div>

    </div>
    </main>

    <!-- Floating Action Button (Mobile) -->
    <button id="fab-log-pr"
        class="md:hidden fixed bottom-6 right-6 w-14 h-14 bg-primary text-background-dark rounded-full shadow-lg shadow-primary/30 flex items-center justify-center z-50 active:scale-90 transition-transform">
        <span class="material-symbols-outlined text-3xl">add</span>
    </button>

    </div>

    {% include 'modals.html' %}

    <!-- SCRIPTS -->
    <script src="/static/js/config.js"></script>
    <script src="/static/js/utils.js"></script>
    <script src="/static/js/milestonesData.js"></script>
    <script src="/static/js/components.js"></script>
    <script src="/static/js/charts.js"></script>
    <script src="/static/js/milestonesView.js"></script>
    <script src="/static/js/modals.js"></script>
    <script src="/static/js/app.js"></script>
</body>

</html>
